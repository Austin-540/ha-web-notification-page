<!DOCTYPE html>
<html lang="en">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap');
    body {
        background: #ffb8f2;
        background-size: 100% 100%;
background: linear-gradient(150deg, rgba(255, 184, 242, 1) 0%, rgba(255, 107, 107, 1) 50%, rgba(250, 187, 100, 1) 100%);
background-repeat: no-repeat;
    }

    html, body {
    margin: 0;
    height: 100%;
}

h1, p {
    font-family: 'Cal Sans';
    justify-content: center;
    display: flex;
    padding: 20px;
}

h1 {
    font-size: 70px;
}

p {
    font-size: 35px;
}

#panel {
    background-color: rgba(255, 255, 255, 0.6);
    border-radius: 10px;
    height: 90vh;
    width: 90vw;
    margin: auto;
}

</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Assistant Notification</title>
</head>

<body>
    <div id="panel">
    <h1 id="title">Loading notification title...</h1>
    <p id="content">Loading notification content...</p>

    </div>
    <script>
        function GetURLParameter(sParam) {
            var sPageURL = globalThis.location.search.substring(1);
            var sURLVariables = sPageURL.split('&');
            for (const element of sURLVariables) {
                var sParameterName = element.split('=');
                if (sParameterName[0] == sParam) {
                    return sParameterName[1];
                }
            }
        }

        const title = GetURLParameter("title");
        const content = GetURLParameter("content");

        if (title === undefined) {
            document.getElementById("title").textContent = "No title provided";
        } else {
            document.getElementById("title").textContent = title;
        }

        if (content === undefined) {
            document.getElementById("content").textContent = "No content provided";
        } else {
            document.getElementById("content").textContent = content;
        }

    </script>

</body>

</html>
